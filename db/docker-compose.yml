# db/docker-compose.yml

services:

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - ../.env    
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ← adicione este serviço
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file:
      - ../.env
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com   # seu login no pgAdmin
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}          # sua senha no pgAdmin
    ports:
      - "5050:80"    # acessa em http://localhost:5050
    depends_on:
      - db
    networks:
      - app_network 

volumes:
  postgres_data:

networks:
  app_network:
    name: app_network      # rede compartilhada entre os três composes
    driver: bridge
