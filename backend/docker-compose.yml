# backend/docker-compose.yml

services:

  backend:
    build:
      context: ..           # raiz do projeto (onde está o Dockerfile e o manage.py)
      dockerfile: Dockerfile
    container_name: django_backend
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn djangoproject.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ../:/app                        # código-fonte mapeado para dentro do container
      - static_files:/app/staticfiles   # arquivos estáticos persistentes
      - media_files:/app/mediafiles     # imagens dos produtos persistentes
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    networks:
      - app_network

volumes:
  static_files:
  media_files:

networks:
  app_network:
    name: app_network
    external: true          # rede criada pelo compose do banco; aqui só reutilizamos